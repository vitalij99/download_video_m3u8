<!-- index.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Video Downloader</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h2>Video Downloader</h2>

    <div class="nameContainer">
      <input id="name" placeholder="Video name" />
      <input id="series" value="1" min="0" type="number" />
    </div>

    <input id="url" placeholder="Video URL .m3u8" />

    <button id="start">Start</button>
    <button id="next">Next</button>
    <button id="segments">Merge Segments video</button>

    <div id="info"></div>
    <p id="statusParagraph"></p>
    <script src="index.js"></script>
  </body>
</html>
